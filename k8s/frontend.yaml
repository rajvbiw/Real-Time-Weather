apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: weather-dashboard
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: weather-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8120
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 8120
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 8120
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: weather-dashboard
spec:
  selector:
    app: frontend
  ports:
    - protocol: TCP
      port: 8120
      targetPort: 8120
